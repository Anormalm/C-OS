services:
  api:
    build: .
    container_name: cos-api
    ports:
      - "8000:8000"
    environment:
      COS_APP_ENV: "prod"
      COS_LOG_LEVEL: "INFO"
      COS_GRAPH_BACKEND: "${COS_GRAPH_BACKEND:-inmemory}"
      COS_VECTOR_BACKEND: "${COS_VECTOR_BACKEND:-inmemory}"
      COS_NEO4J_URI: "bolt://neo4j:7687"
      COS_NEO4J_USER: "neo4j"
      COS_NEO4J_PASSWORD: "${COS_NEO4J_PASSWORD:-password}"
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  neo4j:
    image: neo4j:5.23
    container_name: cos-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/${COS_NEO4J_PASSWORD:-password}"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${COS_NEO4J_PASSWORD:-password} 'RETURN 1;'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  neo4j_data:
